<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <title>Downloader | تحميل البرامج والألعاب</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        /* Glass Morphism */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Header */
        .header {
            padding: 20px;
            margin: 15px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        /* Categories */
        .categories-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .category-chip {
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .category-chip i {
            margin-left: 6px;
        }
        
        .category-chip.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        /* Programs Grid */
        .programs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 10px 0;
        }
        
        .program-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 18px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .program-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .program-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        
        .program-title {
            font-size: 1.2rem;
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .program-description {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .price-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        .price-free {
            background: #10b981;
        }
        
        .price-paid {
            background: #f59e0b;
        }
        
        .download-btn {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .download-btn i {
            margin-left: 6px;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 25px;
            margin-top: 30px;
            background: rgba(0,0,0,0.3);
        }
        
        .social-links {
            margin-top: 12px;
        }
        
        .social-links a {
            color: white;
            margin: 0 8px;
            font-size: 1.3rem;
        }
        
        /* Container */
        .container {
            padding: 0 15px;
        }
        
        /* Error Toast */
        .error-toast {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: #dc2626;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            z-index: 10000;
            font-size: 0.85rem;
        }
        
        /* No Data */
        .no-data {
            padding: 40px;
            text-align: center;
        }
        
        .no-data i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        
        /* Hacker Mode */
        body.hacker-mode {
            background: #0a0a0a;
        }
        
        body.hacker-mode .download-btn {
            background: #0f0;
            color: #000;
        }
    </style>
</head>

</main>

<script>
    // ========== البيانات التجريبية المباشرة ==========

            { id: "cat3", name: "برامج تصميم", icon: "fas fa-palette" },
            { id: "cat4", name: "برامج أمان", icon: "fas fa-shield-alt" }
        ],
        programs: [
            {
                id: "prog1",
                name: "Adobe Photoshop",
                description: "برنامج تصميم وتعديل الصور الاحترافي",
                icon: "fas fa-palette",

                price: 0,

            },
            {
                id: "prog2",
                name: "Need for Speed",
                description: "لعبة سباقات السيارات المثيرة",
                icon: "fas fa-car",
                categoryId: "cat2",
                categoryName: "ألعاب",
                price: 50,
                downloadLink: "#"
            },
            {
                id: "prog3",
                name: "WinRAR",
                description: "برنامج ضغط وفك الملفات",
                icon: "fas fa-file-archive",
                categoryId: "cat1",
                categoryName: "برامج كمبيوتر",
                price: 0,
                downloadLink: "#"
            },
            {
                id: "prog4",
                name: "Kaspersky",
                description: "برنامج حماية من الفيروسات",
                icon: "fas fa-shield-alt",
                categoryId: "cat4",
                categoryName: "برامج أمان",
                price: 100,
                downloadLink: "#"
            },
            {
                id: "prog5",
                name: "PUBG Mobile",
                description: "لعبة الباتل رويال الشهيرة",
                icon: "fas fa-fist-raised",
                categoryId: "cat2",
                categoryName: "ألعاب",
                price: 0,
                downloadLink: "#"
            },
            {
                id: "prog6",
                name: "Illustrator",
                description: "برنامج تصميم المتجهات والرسومات",
                icon: "fas fa-paint-brush",
                categoryId: "cat3",
                categoryName: "برامج تصميم",
                price: 0,

            }
        ],
        customCss: "",
        customHtml: "",
        customJs: ""
    };
    
    // Configuration
    const API_KEY = "$2a$10$f9YalTG10QTmZbvhEk4lYOr5qH8XCarbV/ttzf7c5VS1eKuigcC16";
    const BIN_ID = "69bff108b7ec241ddc904ab8";
    
    let siteData = { ...defaultData };
    let currentCategory = null;
    let isDataLoaded = false;
    
    // Show error message
    function showError(message) {
        console.error(message);
        const toast = document.createElement('div');
        toast.className = 'error-toast';
        toast.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    // Update favicon
    function updateFavicon(url) {
        let link = document.querySelector("link[rel*='icon']");
        if (!link) {
            link = document.createElement('link');
            link.rel = 'shortcut icon';
            document.head.appendChild(link);
        }
        link.href = url;
    }
    
    // Apply theme
    function applyTheme(theme) {
        if (theme.hackerMode) {
            document.body.classList.add('hacker-mode');
        } else {
            document.body.classList.remove('hacker-mode');
            document.body.style.background = theme.bgGradient;
        }
    }
    
    // Render categories
    function renderCategories() {
        const container = document.getElementById('categories-container');
        if (!container) return;
        
        if (siteData.categories && siteData.categories.length > 0) {
            let html = `<div class="categories-wrapper">`;
            html += `<div class="category-chip ${!currentCategory ? 'active' : ''}" onclick="filterByCategory(null)">
                        <i class="fas fa-th-large"></i> الكل
                     </div>`;
            siteData.categories.forEach(cat => {
                html += `
                    <div class="category-chip ${currentCategory === cat.id ? 'active' : ''}" onclick="filterByCategory('${cat.id}')">
                        <i class="${cat.icon || 'fas fa-folder'}"></i> ${cat.name}
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div class="glass no-data"><i class="fas fa-folder-open"></i> لا توجد أقسام</div>`;
        }
    }
    
    // Render programs
    function renderPrograms() {
        const container = document.getElementById('programs-container');
        if (!container) return;
        
        let filteredPrograms = siteData.programs || [];
        if (currentCategory) {
            filteredPrograms = filteredPrograms.filter(p => p.categoryId === currentCategory);
        }
        
        if (filteredPrograms.length > 0) {
            let html = `<div class="programs-grid">`;
            filteredPrograms.forEach(prog => {
                const priceClass = prog.price === 0 ? 'price-free' : 'price-paid';
                const priceText = prog.price === 0 ? 'مجاني' : `${prog.price} جنيه`;
                html += `
                    <div class="program-card">
                        <div class="program-icon">
                            <i class="${prog.icon || 'fas fa-download'}"></i>
                        </div>
                        <h3 class="program-title">${escapeHtml(prog.name)}</h3>
                        <p class="program-description">${escapeHtml(prog.description || 'لا يوجد وصف')}</p>
                        <div class="price-badge ${priceClass}">
                            <i class="fas ${prog.price === 0 ? 'fa-gift' : 'fa-tag'}"></i> ${priceText}
                        </div>
                        <div>
                            <a href="${prog.downloadLink}" target="_blank" class="download-btn">
                                <i class="fas fa-download"></i> تحميل
                            </a>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        } else {
            container.innerHTML = `<div class="glass no-data"><i class="fas fa-folder-open"></i> لا توجد برامج في هذا القسم</div>`;
        }
    }
    
    // Escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Fetch data from JSONBin
    async function fetchFromJsonBin() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                headers: { 'X-Master-Key': API_KEY },
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (response.ok) {
                const data = await response.json();
                if (data.record && data.record.categories && data.record.categories.length > 0) {
                    siteData = { ...defaultData, ...data.record };
                    console.log('تم تحميل البيانات من JSONBin');
                }
            }
        } catch (error) {
            console.log('فشل الاتصال بـ JSONBin، استخدام البيانات المحلية');
            // نستخدم البيانات الافتراضية
        }
    }
    
    // Hide loading and show content
    function showContent() {
        const loadingScreen = document.getElementById('loading-screen');
        const mainContent = document.getElementById('main-content');
        
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            mainContent.style.display = 'block';
            
            // تطبيق الإعدادات
            applyTheme(siteData.settings.theme);
            updateFavicon(siteData.settings.faviconUrl);
            document.getElementById('loading-text').innerText = siteData.settings.loadingText;
            
            // عرض المحتوى
            renderCategories();
            renderPrograms();
        }, 500);
    }
    
    // Filter by category
    window.filterByCategory = (catId) => {
        currentCategory = catId;
        renderCategories();
        renderPrograms();
    };
    
    // Main initialization
    async function init() {
        // أولاً عرض البيانات الافتراضية فوراً
        showContent();
        
        // ثم محاولة جلب البيانات من JSONBin في الخلفية
        await fetchFromJsonBin();
        
        // تحديث المحتوى إذا تم جلب بيانات جديدة
        if (siteData.categories && siteData.categories.length > 0) {
            renderCategories();
            renderPrograms();
        }
    }
    
    // Start
    init();
</script>
</body>
