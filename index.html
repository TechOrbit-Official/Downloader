<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Downloader - أكبر منصة تحميل برامج وألعاب مجانية ومدفوعة">
    <title>Downloader | تحميل البرامج والألعاب</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style id="dynamic-styles">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            transition: all 0.3s ease;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Background Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" fill-opacity="1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            pointer-events: none;
            z-index: -1;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
            flex-direction: column;
            gap: 30px;
        }
        
        .loader-wrapper {
            text-align: center;
        }
        
        .loader {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .loader:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        
        .loader:after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            border-bottom-color: #fff;
            animation: spin 0.8s linear infinite reverse;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Glass Morphism */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        /* Header */
        .header {
            padding: 20px;
            margin: 20px;
            text-align: center;
            animation: slideDown 0.6s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        /* Categories */
        .categories-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
        }
        
        .category-chip {
            padding: 12px 28px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .category-chip:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .category-chip.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }
        
        /* Programs Grid */
        .programs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }
        
        .program-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .program-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .program-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        .program-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .program-description {
            color: rgba(255,255,255,0.8);
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .price-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .price-free {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .price-paid {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        
        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1rem;
        }
        
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 40px;
            margin-top: 60px;
            background: rgba(0,0,0,0.3);
        }
        
        .social-links {
            margin-top: 20px;
        }
        
        .social-links a {
            color: white;
            margin: 0 10px;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .social-links a:hover {
            transform: translateY(-3px);
            color: #667eea;
        }
        
        /* Error Toast */
        .error-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(220, 38, 38, 0.95);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 10000;
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .programs-grid { grid-template-columns: 1fr; }
            .category-chip { padding: 8px 20px; font-size: 0.9rem; }
        }
        
        /* Hacker Mode */
        body.hacker-mode {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
        }
        
        body.hacker-mode .glass {
            background: rgba(0, 255, 0, 0.1);
            border-color: #0f0;
        }
        
        body.hacker-mode .download-btn {
            background: #0f0;
            color: #000;
        }
        
        body.hacker-mode .program-card:hover {
            border-color: #0f0;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader-wrapper">
        <div class="loader"></div>
        <div class="loading-text" id="loading-text">جاري تجهيز المحتوى...</div>
    </div>
</div>

<main id="main-content" style="display: none;">
    <div class="header glass" data-aos="fade-down">
        <h1><i class="fas fa-download"></i> Downloader</h1>
        <p>اكتشف أفضل البرامج والألعاب - مجانية ومدفوعة</p>
    </div>

    <div class="container" style="max-width: 1200px; margin: auto; padding: 0 20px;">
        <div id="categories-container"></div>
        <div id="programs-container"></div>
    </div>

    <div class="footer">
        <p>© 2026 Downloader - بواسطة <strong>TechOrbit-Team & Mohamed Hany</strong></p>
        <div class="social-links">
            <a href="https://wa.me/201025702919" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:contact.techorbit.team@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
        <p style="font-size: 0.8rem; margin-top: 10px;">جميع الحقوق محفوظة</p>
    </div>
</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // Configuration
    const API_KEY = "$2a$10$f9YalTG10QTmZbvhEk4lYOr5qH8XCarbV/ttzf7c5VS1eKuigcC16";
    const BIN_ID = "69bff108b7ec241ddc904ab8";
    
    let siteData = {
        settings: {
            theme: {
                bgGradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
                textColor: "#ffffff",
                glassEffect: true,
                hackerMode: false
            },
            loadingText: "جاري تجهيز المحتوى...",
            faviconUrl: "https://cdn-icons-png.flaticon.com/512/724/724933.png"
        },
        categories: [],
        programs: [],
        customCss: "",
        customHtml: ""
    };
    
    let currentCategory = null;
    
    // Show error toast
    function showError(message) {
        console.error(message);
        const toast = document.createElement('div');
        toast.className = 'error-toast';
        toast.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'slideOutRight 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 5000);
    }
    
    // Update favicon
    function updateFavicon(url) {
        let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.type = 'image/x-icon';
        link.rel = 'shortcut icon';
        link.href = url;
        document.getElementsByTagName('head')[0].appendChild(link);
    }
    
    // Apply theme
    function applyTheme(theme) {
        if (theme.hackerMode) {
            document.body.classList.add('hacker-mode');
            document.body.style.background = '#0a0a0a';
        } else {
            document.body.classList.remove('hacker-mode');
            document.body.style.background = theme.bgGradient;
        }
        document.body.style.color = theme.textColor;
        
        if (!theme.glassEffect) {
            const glassElements = document.querySelectorAll('.glass, .program-card, .category-chip');
            glassElements.forEach(el => {
                el.style.background = 'rgba(0,0,0,0.7)';
                el.style.backdropFilter = 'none';
            });
        }
    }
    
    // Apply custom CSS
    function applyCustomCss(css) {
        let styleTag = document.getElementById('custom-css');
        if (!styleTag) {
            styleTag = document.createElement('style');
            styleTag.id = 'custom-css';
            document.head.appendChild(styleTag);
        }
        styleTag.textContent = css;
    }
    
    // Apply custom HTML
    function applyCustomHtml(html) {
        const customDiv = document.getElementById('custom-html');
        if (customDiv) customDiv.remove();
        if (html && html.trim()) {
            const div = document.createElement('div');
            div.id = 'custom-html';
            div.innerHTML = html;
            document.body.appendChild(div);
        }
    }
    
    // Fetch data with error handling
    async function fetchData() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                headers: { 'X-Master-Key': API_KEY },
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            
            if (data.record) {
                siteData = { ...siteData, ...data.record };
                applyTheme(siteData.settings.theme);
                document.getElementById('loading-text').innerText = siteData.settings.loadingText;
                updateFavicon(siteData.settings.faviconUrl);
                applyCustomCss(siteData.customCss || '');
                applyCustomHtml(siteData.customHtml || '');
                renderContent();
                AOS.init({ duration: 1000, once: true });
            } else {
                throw new Error('بيانات غير صالحة من الخادم');
            }
        } catch (error) {
            console.error('Fetch error:', error);
            let errorMessage = 'حدث خطأ في الاتصال بالإنترنت';
            
            if (error.name === 'AbortError') {
                errorMessage = 'انتهت مهلة الاتصال، يرجى التحقق من اتصال الإنترنت';
            } else if (error.message.includes('Failed to fetch')) {
                errorMessage = 'لا يوجد اتصال بالإنترنت، يرجى التحقق من الشبكة';
            } else {
                errorMessage = error.message;
            }
            
            showError(errorMessage);
            
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    document.getElementById('categories-container').innerHTML = `
                        <div class="glass" style="padding: 40px; text-align: center;">
                            <i class="fas fa-wifi" style="font-size: 3rem; margin-bottom: 15px; display: block;"></i>
                            <h3>لا يوجد اتصال بالإنترنت</h3>
                            <p>يرجى التحقق من اتصالك بالشبكة وإعادة تحميل الصفحة</p>
                            <button onclick="location.reload()" class="download-btn" style="margin-top: 15px;">
                                <i class="fas fa-sync-alt"></i> إعادة المحاولة
                            </button>
                        </div>
                    `;
                }, 500);
            }, 1500);
        }
    }
    
    // Render content
    function renderContent() {
        // Render categories
        const categoriesContainer = document.getElementById('categories-container');
        if (siteData.categories.length > 0) {
            let catsHtml = `<div class="categories-wrapper">`;
            catsHtml += `<div class="category-chip ${!currentCategory ? 'active' : ''}" onclick="filterByCategory(null)">
                            <i class="fas fa-th-large"></i> الكل
                         </div>`;
            siteData.categories.forEach(cat => {
                catsHtml += `
                    <div class="category-chip ${currentCategory === cat.id ? 'active' : ''}" onclick="filterByCategory('${cat.id}')">
                        <i class="${cat.icon || 'fas fa-folder'}"></i> ${cat.name}
                    </div>
                `;
            });
            catsHtml += `</div>`;
            categoriesContainer.innerHTML = catsHtml;
        } else {
            categoriesContainer.innerHTML = `<div class="glass" style="padding: 20px; text-align: center;">لا توجد أقسام حالياً</div>`;
        }
        
        // Filter programs
        let filteredPrograms = siteData.programs;
        if (currentCategory) {
            filteredPrograms = siteData.programs.filter(p => p.categoryId === currentCategory);
        }
        
        // Render programs
        const programsContainer = document.getElementById('programs-container');
        if (filteredPrograms.length > 0) {
            let programsHtml = `<div class="programs-grid">`;
            filteredPrograms.forEach((prog, index) => {
                const priceClass = prog.price === 0 ? 'price-free' : 'price-paid';
                const priceText = prog.price === 0 ? 'مجاني' : `${prog.price} جنيه`;
                programsHtml += `
                    <div class="program-card" data-aos="fade-up" data-aos-delay="${index * 100}">
                        <div class="program-icon">
                            <i class="${prog.icon || 'fas fa-download'}"></i>
                        </div>
                        <h3 class="program-title">${prog.name}</h3>
                        <p class="program-description">${prog.description || 'لا يوجد وصف متاح'}</p>
                        <div class="price-badge ${priceClass}">
                            <i class="fas ${prog.price === 0 ? 'fa-gift' : 'fa-tag'}"></i> ${priceText}
                        </div>
                        <div>
                            <a href="${prog.downloadLink}" target="_blank" class="download-btn">
                                <i class="fas fa-download"></i> تحميل الآن
                            </a>
                        </div>
                    </div>
                `;
            });
            programsHtml += `</div>`;
            programsContainer.innerHTML = programsHtml;
        } else {
            programsContainer.innerHTML = `
                <div class="glass" style="padding: 60px; text-align: center;">
                    <i class="fas fa-folder-open" style="font-size: 4rem; margin-bottom: 20px; display: block;"></i>
                    <h3>لا توجد برامج في هذا القسم</h3>
                    <p>سيتم إضافة محتوى جديد قريباً</p>
                </div>
            `;
        }
        
        // Hide loading screen
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 500);
        }, 800);
    }
    
    // Filter by category
    window.filterByCategory = (catId) => {
        currentCategory = catId;
        renderContent();
    };
    
    // Initialize
    fetchData();
</script>
</body>
</html>
