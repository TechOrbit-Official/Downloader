<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Downloader - تحميل البرامج والألعاب</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style id="dynamic-styles">
        /* سيتم تعبئة هذه الأنماط ديناميكيًا من JSONBin */
        :root {
            --bg-color: #0a0f1e;
            --card-bg: rgba(15, 25, 45, 0.7);
            --text-color: #ffffff;
            --primary-color: #3b82f6;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }
        /* أنماط الزجاج */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59,130,246,0.3);
        }
        .program-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);
        }
        .program-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .price-tag {
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            background: rgba(0,0,0,0.5);
        }
        .free {
            color: #10b981;
        }
        .paid {
            color: #f59e0b;
        }
        /* شريط التحميل */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
            flex-direction: column;
            gap: 20px;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            border-right: 5px solid var(--primary-color);
            padding-right: 15px;
        }
        @media (max-width: 768px) {
            .container { padding: 0 15px; }
            .program-card { padding: 15px; }
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
    <p id="loading-text">جاري تجهيز المحتوى...</p>
</div>

<main id="main-content" style="display: none;">
    <header class="glass" style="padding: 20px; margin: 20px; text-align: center;">
        <h1><i class="fas fa-download"></i> Downloader</h1>
        <p>أكبر منصة تحميل برامج وألعاب</p>
    </header>

    <div class="container" style="max-width: 1200px; margin: auto; padding: 0 20px;">
        <div id="categories-container"></div>
        <div id="programs-container"></div>
    </div>

    <footer style="text-align: center; padding: 30px; margin-top: 40px; background: rgba(0,0,0,0.3);">
        <p>© 2025 Downloader - بواسطة <strong>TechOrbit-Team & Mohamed Hany</strong></p>
        <p>
            <a href="https://wa.me/201025702919" style="color: var(--primary-color); text-decoration: none;"><i class="fab fa-whatsapp"></i> واتساب</a> | 
            <a href="mailto:contact.techorbit.team@gmail.com" style="color: var(--primary-color); text-decoration: none;"><i class="fas fa-envelope"></i> البريد الإلكتروني</a>
        </p>
    </footer>
</main>

<script>
    // ========== إعدادات JSONBin ==========
    const API_KEY = "$2a$10$f9YalTG10QTmZbvhEk4lYOr5qH8XCarbV/ttzf7c5VS1eKuigcC16";
    const BIN_ID = "69bff108b7ec241ddc904ab8";
    let siteData = {
        settings: {
            theme: {
                bgColor: "#0a0f1e",
                textColor: "#ffffff",
                primaryColor: "#3b82f6",
                glassEffect: true,
                hackerMode: false
            },
            loadingText: "جاري التحميل...",
            faviconUrl: "https://cdn-icons-png.flaticon.com/512/724/724933.png"
        },
        categories: [],
        programs: []
    };

    // تحديث الفافيكون
    function updateFavicon(url) {
        let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
        link.type = 'image/x-icon';
        link.rel = 'shortcut icon';
        link.href = url;
        document.getElementsByTagName('head')[0].appendChild(link);
    }

    // تطبيق الثيم
    function applyTheme(theme) {
        const root = document.documentElement;
        root.style.setProperty('--bg-color', theme.bgColor);
        root.style.setProperty('--text-color', theme.textColor);
        root.style.setProperty('--primary-color', theme.primaryColor);
        if (theme.glassEffect) {
            root.style.setProperty('--card-bg', 'rgba(15, 25, 45, 0.7)');
            root.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.1)');
        } else {
            root.style.setProperty('--card-bg', '#1e293b');
            root.style.setProperty('--glass-border', '#334155');
        }
        if (theme.hackerMode) {
            root.style.setProperty('--bg-color', '#0f0f0f');
            root.style.setProperty('--text-color', '#00ff41');
            root.style.setProperty('--primary-color', '#00ff41');
            root.style.setProperty('--card-bg', 'rgba(0, 20, 0, 0.8)');
        }
        document.body.style.background = `var(--bg-color)`;
    }

    // جلب البيانات من JSONBin
    async function fetchData() {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            if (!response.ok) throw new Error('فشل في جلب البيانات');
            const data = await response.json();
            if (data.record) {
                siteData = data.record;
                // تطبيق الإعدادات
                applyTheme(siteData.settings.theme);
                document.getElementById('loading-text').innerText = siteData.settings.loadingText;
                updateFavicon(siteData.settings.faviconUrl);
                renderContent();
            }
        } catch (error) {
            console.error('خطأ في جلب البيانات:', error);
            document.getElementById('loading-text').innerText = 'حدث خطأ، يرجى المحاولة لاحقاً';
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                }, 500);
            }, 1500);
        }
    }

    // عرض المحتوى
    function renderContent() {
        // عرض الأقسام
        const categoriesContainer = document.getElementById('categories-container');
        if (siteData.categories.length > 0) {
            let catsHtml = `<div class="section-title"><i class="fas fa-tags"></i> الأقسام</div><div style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 40px;">`;
            siteData.categories.forEach(cat => {
                catsHtml += `
                    <div class="glass" style="padding: 10px 25px; border-radius: 40px; cursor: pointer;" onclick="filterByCategory('${cat.id}')">
                        <i class="${cat.icon || 'fas fa-folder'}"></i> ${cat.name}
                    </div>
                `;
            });
            catsHtml += `</div>`;
            categoriesContainer.innerHTML = catsHtml;
        } else {
            categoriesContainer.innerHTML = `<div class="glass" style="padding: 20px; text-align: center;">لا توجد أقسام بعد</div>`;
        }

        // عرض البرامج
        const programsContainer = document.getElementById('programs-container');
        let programsHtml = `<div class="section-title"><i class="fas fa-download"></i> أحدث البرامج والألعاب</div><div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;">`;
        siteData.programs.forEach(prog => {
            const priceClass = prog.price === 0 ? 'free' : 'paid';
            const priceText = prog.price === 0 ? 'مجاني' : `${prog.price} جنيه`;
            programsHtml += `
                <div class="program-card">
                    <h3><i class="${prog.icon || 'fas fa-gamepad'}"></i> ${prog.name}</h3>
                    <p>${prog.description || 'لا يوجد وصف'}</p>
                    <div class="price-tag ${priceClass}">${priceText}</div>
                    <div style="margin-top: 15px;">
                        <a href="${prog.downloadLink}" target="_blank" class="btn-primary" style="display: inline-block; text-decoration: none; background: var(--primary-color);">تحميل الآن</a>
                    </div>
                    <div style="margin-top: 10px; font-size: 0.8rem; color: #aaa;">القسم: ${prog.categoryName || 'عام'}</div>
                </div>
            `;
        });
        programsHtml += `</div>`;
        programsContainer.innerHTML = programsHtml;

        // إخفاء شاشة التحميل
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 500);
        }, 800);
    }

    window.filterByCategory = (catId) => {
        const category = siteData.categories.find(c => c.id === catId);
        if(!category) return;
        const filtered = siteData.programs.filter(p => p.categoryId === catId);
        const programsContainer = document.getElementById('programs-container');
        if(filtered.length === 0) {
            programsContainer.innerHTML = `<div class="glass" style="padding: 40px; text-align: center;">لا توجد برامج في هذا القسم بعد</div>`;
            return;
        }
        let programsHtml = `<div class="section-title"><i class="fas fa-filter"></i> برامج قسم ${category.name}</div><div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;">`;
        filtered.forEach(prog => {
            const priceClass = prog.price === 0 ? 'free' : 'paid';
            const priceText = prog.price === 0 ? 'مجاني' : `${prog.price} جنيه`;
            programsHtml += `
                <div class="program-card">
                    <h3><i class="${prog.icon || 'fas fa-gamepad'}"></i> ${prog.name}</h3>
                    <p>${prog.description || 'لا يوجد وصف'}</p>
                    <div class="price-tag ${priceClass}">${priceText}</div>
                    <div style="margin-top: 15px;">
                        <a href="${prog.downloadLink}" target="_blank" class="btn-primary" style="display: inline-block; text-decoration: none;">تحميل الآن</a>
                    </div>
                </div>
            `;
        });
        programsHtml += `</div>`;
        programsContainer.innerHTML = programsHtml;
    };

    fetchData();
</script>
</body>
</html>
